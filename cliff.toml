[changelog]
header = """
# Changelog
"""

body = """
{% for group, commits in commits | group_by(attribute="group") %}
## {{ group }}

{% for commit in commits %}
- {{ commit.message }} ({{ commit.id | truncate(length=7, end="") }})
{% endfor %}

{% endfor %}
"""

trim = true

[git]
conventional_commits = true
filter_unconventional = false
tag_pattern = "v[0-9]*"
sort_commits = "oldest"

# ✅ ONLY ARRAY TABLES — NO [commit_types] ANYWHERE

[[commit_types]]
message = "^feat"
group = "Features"

[[commit_types]]
message = "^fix"
group = "Bug Fixes"

[[commit_types]]
message = "^docs"
group = "Documentation"

[[commit_types]]
message = "^refactor"
group = "Refactoring"

[[commit_types]]
message = "^perf"
group = "Performance"

[[commit_types]]
message = "^test"
group = "Tests"

[[commit_types]]
message = "^chore"
group = "Chores"