name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  DOTNET_VERSION: "11.0.100-preview.2.26159.112" # Exact preview version
  PROJECT_PATH: "src/ZeroTrustAPI.Api/ZeroTrustAPI.Api.csproj"
  TEST_PATH: "tests/ZeroTrustAPI.Tests/ZeroTrustAPI.Tests.csproj"
  MIN_COVERAGE: 85

jobs:
  # Job 1: Restore and cache dependencies
  restore:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Restore dependencies
        run: dotnet restore
      - name: Cache .NET packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

  # Job 2: Build solution (depends on restore)
  build:
    runs-on: ubuntu-latest
    needs: restore
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Restore (from cache)
        run: dotnet restore
      - name: Build
        run: dotnet build --no-restore -c Release

  # Job 3: Run tests and collect coverage (depends on build)
  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Restore
        run: dotnet restore
      - name: Run tests with coverage
        run: |
          dotnet test ${{ env.TEST_PATH }} \
            --no-restore \
            --verbosity normal \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults
      - name: Install coverage tools
        run: dotnet tool install -g dotnet-coverage
      - name: Merge coverage reports
        run: dotnet-coverage merge ./TestResults/**/coverage.cobertura.xml --output ./coverage.xml
      - name: Install report generator
        run: dotnet tool install -g dotnet-reportgenerator-globaltool
      - name: Generate coverage report
        run: reportgenerator -reports:./coverage.xml -targetdir:./coveragereport -reporttypes:Html -assemblyfilters:-xunit*
      - name: Check coverage threshold
        run: |
          COVERAGE=$(grep -oP 'line-rate="\K[0-9.]+' ./coveragereport/Summary.xml | head -1)
          COVERAGE_PERCENT=$(echo "$COVERAGE * 100" | bc | cut -d. -f1)
          echo "Code coverage: $COVERAGE_PERCENT%"
          if [ "$COVERAGE_PERCENT" -lt "${{ env.MIN_COVERAGE }}" ]; then
            echo "❌ Coverage $COVERAGE_PERCENT% is below required ${{ env.MIN_COVERAGE }}%"
            exit 1
          else
            echo "✅ Coverage $COVERAGE_PERCENT% meets threshold ${{ env.MIN_COVERAGE }}%"
          fi
      - name: Upload coverage report artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ./coveragereport

  # Job 4: Security scan (SAST) – optional but recommended
  security-scan:
    runs-on: ubuntu-latest
    needs: restore
    steps:
      - uses: actions/checkout@v4
      - name: Run CodeQL analysis
        uses: github/codeql-action/init@v3
        with:
          languages: csharp
      - uses: github/codeql-action/autobuild@v3
      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:csharp"

  # Job 5: Docker build and test (depends on tests passing)
  docker-build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: zero-trust-api:ci
          load: true
      - name: Run container and test health endpoint
        run: |
          docker run -d -p 5000:8080 --name zero-trust-api zero-trust-api:ci
          sleep 5
          curl --fail http://localhost:5000/health || (docker logs zero-trust-api && exit 1)
          docker stop zero-trust-api
          docker rm zero-trust-api

  # Job 6: (Optional) Push Docker image to registry on main branch
  push-to-registry:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
