name: CI/CD

on:
  push:
    branches: [main, develop]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write
  packages: write

env:
  DOTNET_VERSION: "10.0.100"
  PROJECT_PATH: "src/ZeroTrustAPI.Api/ZeroTrustAPI.Api.csproj"
  TEST_PATH: "tests/ZeroTrustAPI.Tests/ZeroTrustAPI.Tests.csproj"
  MIN_COVERAGE: 85

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Restore
        run: dotnet restore ${{ env.PROJECT_PATH }}
      - name: Get version from MinVer
        id: get_version
        run: |
          VERSION=$(dotnet msbuild ${{ env.PROJECT_PATH }} /t:GetVersion /p:MinVerForceVersion=0.0.0 /nologo /v:quiet | grep -oP '\d+\.\d+\.\d+.*' || echo "0.0.0")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

  restore:
    runs-on: ubuntu-latest
    needs: version
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Restore dependencies
        run: dotnet restore
      - name: Cache .NET packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

  build:
    runs-on: ubuntu-latest
    needs: restore
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Restore
        run: dotnet restore
      - name: Build
        run: dotnet build --no-restore -c Release

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Restore
        run: dotnet restore
      - name: Run tests with coverage
        run: |
          dotnet test ${{ env.TEST_PATH }} \
            --no-restore \
            --verbosity normal \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults
      - name: Install coverage tools
        run: dotnet tool install -g dotnet-coverage
      - name: Merge coverage reports
        run: dotnet-coverage merge ./TestResults/**/coverage.cobertura.xml --output ./coverage.xml
      - name: Install report generator
        run: dotnet tool install -g dotnet-reportgenerator-globaltool
      - name: Generate coverage report
        run: reportgenerator -reports:./coverage.xml -targetdir:./coveragereport -reporttypes:Html -assemblyfilters:-xunit*
      - name: Check coverage threshold
        run: |
          COVERAGE=$(grep -oP 'line-rate="\K[0-9.]+' ./coveragereport/Summary.xml | head -1)
          COVERAGE_PERCENT=$(echo "$COVERAGE * 100" | bc | cut -d. -f1)
          echo "Code coverage: $COVERAGE_PERCENT%"
          if [ "$COVERAGE_PERCENT" -lt "${{ env.MIN_COVERAGE }}" ]; then
            echo "❌ Coverage $COVERAGE_PERCENT% is below required ${{ env.MIN_COVERAGE }}%"
            exit 1
          else
            echo "✅ Coverage $COVERAGE_PERCENT% meets threshold ${{ env.MIN_COVERAGE }}%"
          fi
      - name: Upload coverage report artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ./coveragereport

  security-scan:
    runs-on: ubuntu-latest
    needs: restore
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: csharp
      - name: Restore dependencies
        run: dotnet restore
      - name: Build for CodeQL
        run: dotnet build --no-restore -c Release
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:csharp"

  docker-build:
    runs-on: ubuntu-latest
    needs: [test, version]
    services:
      postgres:
        image: postgres:latest
        env:
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: zero-trust-api:ci
          load: true
          no-cache: true
      - name: Run container and test health endpoint
        run: |
          docker run -d \
            --name zero-trust-api \
            --network host \
            -e ASPNETCORE_URLS="http://0.0.0.0:5000" \
            -e ConnectionStrings__DefaultConnection="Host=localhost;Database=${{ secrets.POSTGRES_DB }};Username=${{ secrets.POSTGRES_USER }};Password=${{ secrets.POSTGRES_PASSWORD }};GSSEncryptionMode=Disable" \
            -e Jwt__Key="${{ secrets.JWT_KEY }}" \
            -e Jwt__Issuer="ZeroTrustAPI" \
            -e Jwt__Audience="ZeroTrustAPIUsers" \
            zero-trust-api:ci
          sleep 10
          curl --fail http://localhost:5000/health || (docker logs zero-trust-api && exit 1)
          docker stop zero-trust-api
          docker rm zero-trust-api

  push-to-registry:
    runs-on: ubuntu-latest
    needs: [docker-build, version]
    if: github.ref == 'refs/heads/main'
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ needs.version.outputs.version }}
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          no-cache: true
