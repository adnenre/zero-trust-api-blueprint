name: Link branch to issue

on:
  issues:
    types: [opened] # se déclenche quand un nouvel issue est ouvert
  # Optionnel : aussi sur assignation de label 'create-branch'
  # issue_comment: ...

permissions:
  contents: write
  issues: write

jobs:
  create-branch:
    runs-on: ubuntu-latest
    if: github.event.action == 'opened' # seulement à l'ouverture
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create branch from issue number
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          # Nettoyer le titre pour en faire un nom de branche valide
          BRANCH_NAME="issue-${ISSUE_NUMBER}"
          echo "Creating branch: $BRANCH_NAME"
          git checkout -b "$BRANCH_NAME" main
          git push origin "$BRANCH_NAME"

      - name: Comment on issue with branch link
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = context.issue.number;
            const branchName = `issue-${issueNumber}`;
            const comment = `🌿 Branche créée : [${branchName}](https://github.com/${context.repo.owner}/${context.repo.repo}/tree/${branchName})\n\nVous pouvez travailler sur cette branche pour résoudre cet issue.`;
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: comment
            });
